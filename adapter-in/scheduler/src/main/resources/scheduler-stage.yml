# ============================================================
# Scheduler Adapter 스테이징 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 지연
        delay-seconds: 30

      recover-timeout:
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 타임아웃
        timeout-seconds: 180

    image-upload-outbox:
      process-pending:
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 30
        # Stage: 중간 지연
        delay-seconds: 20

      recover-timeout:
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 30
        # Stage: 중간 타임아웃
        timeout-seconds: 180

    seller-admin-auth-outbox:
      process-pending:
        # Stage: 비활성화 (SellerAdminIdentityClient 미구현)
        enabled: false
        cron: "0 */3 * * * *"
        batch-size: 50
        delay-seconds: 30

      recover-timeout:
        # Stage: 비활성화 (SellerAdminIdentityClient 미구현)
        enabled: false
        cron: "0 */5 * * * *"
        batch-size: 50
        timeout-seconds: 180

    image-transform-outbox:
      process-pending:
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 30
        # Stage: 중간 지연
        delay-seconds: 10

      poll-processing:
        # Stage: 2분마다
        cron: "0 */2 * * * *"
        # Stage: 중간 배치
        batch-size: 30

      recover-timeout:
        # Stage: 10분마다
        cron: "0 */10 * * * *"
        # Stage: 중간 배치
        batch-size: 30
        # Stage: 중간 타임아웃
        timeout-seconds: 600

    intelligence-pipeline:
      process-pending:
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 15
        # Stage: 중간 지연
        delay-seconds: 30

      recover-timeout:
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 15
        # Stage: 중간 타임아웃
        timeout-seconds: 300

      recover-stuck-aggregation:
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 15
        # Stage: 중간 stuck 기준
        stuck-seconds: 180

    outbound-sync-outbox:
      process-pending:
        # Stage: 활성화
        enabled: true
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        timezone: "Asia/Seoul"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 지연
        delay-seconds: 30

      recover-timeout:
        # Stage: 활성화
        enabled: true
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        timezone: "Asia/Seoul"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 타임아웃
        timeout-seconds: 180

    legacy-conversion-seeder:
      # Stage: 활성화 (부분 테스트)
      enabled: true
      # Stage: 15분마다
      cron: "0 */15 * * * *"
      # Stage: 중간 배치
      batch-size: 50
      # Stage: 200건 제한
      max-total: 200

    description-publish:
      # Stage: 5분마다
      cron: "0 */5 * * * *"
      timezone: "Asia/Seoul"
      # Stage: 중간 배치
      batch-size: 30
