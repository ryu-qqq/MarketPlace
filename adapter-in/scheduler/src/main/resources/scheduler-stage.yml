# ============================================================
# Scheduler Adapter 스테이징 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
# ============================================================
# 주기 정책:
#   - PENDING 처리 (메인 작업): 5초
#   - 타임아웃/복구: 1분
#   - FAILED 복구: 5분
#   - retry 계열: 1분
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        cron: "*/5 * * * * *"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        cron: "0 */1 * * * *"
        batch-size: 50
        timeout-seconds: 180

    image-upload-outbox:
      process-pending:
        cron: "*/5 * * * * *"
        batch-size: 30
        delay-seconds: 5

      poll-processing:
        enabled: false
        cron: "0 */1 * * * *"
        batch-size: 30

      recover-timeout:
        cron: "0 */1 * * * *"
        batch-size: 30
        timeout-seconds: 60

      recover-failed:
        cron: "0 */5 * * * *"
        batch-size: 50
        failed-after-seconds: 300

    seller-admin-auth-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "0 */1 * * * *"
        batch-size: 50
        timeout-seconds: 180

    image-transform-outbox:
      process-pending:
        cron: "*/5 * * * * *"
        batch-size: 30
        delay-seconds: 5

      poll-processing:
        enabled: false
        cron: "0 */1 * * * *"
        batch-size: 30

      recover-timeout:
        cron: "0 */1 * * * *"
        batch-size: 30
        timeout-seconds: 60

    image-variant-sync-outbox:
      process-pending:
        cron: "*/5 * * * * *"
        batch-size: 30

    intelligence-pipeline:
      process-pending:
        enabled: false
        cron: "*/5 * * * * *"
        batch-size: 15
        delay-seconds: 5

      recover-timeout:
        enabled: false
        cron: "0 */1 * * * *"
        batch-size: 15
        timeout-seconds: 300

      recover-stuck-aggregation:
        enabled: false
        cron: "0 */1 * * * *"
        batch-size: 15
        stuck-seconds: 180

    outbound-sync-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "0 */1 * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        timeout-seconds: 180

    legacy-conversion:
      # Stage: 활성화 (레거시 상품 변환)
      enabled: true
      cron: "*/5 * * * * *"

    legacy-order-conversion:
      # Stage: 비활성화 (로컬 Docker로 검증)
      enabled: false
      cron: "*/5 * * * * *"

    legacy-order-conversion-timeout:
      cron: "0 */1 * * * *"

    legacy-order-conversion-seeder:
      # Stage: 임시 비활성화
      enabled: false
      cron: "0 */1 * * * *"
      batch-size: 200
      max-total: 0

    inbound-order-polling:
      entries:
        - sales-channel-id: 2
          enabled: true
          cron: "*/30 * * * * *"
          timezone: Asia/Seoul
          batch-size: 300
        - sales-channel-id: 16
          enabled: false
          cron: "0 0 10,13,15,17,19 * * *"
          timezone: Asia/Seoul
          batch-size: 300

    inbound-product-retry:
      cron: "0 */1 * * * *"
      batch-size: 30

    outbound-seller-outbox:
      process-pending:
        cron: "*/5 * * * * *"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        cron: "0 */1 * * * *"
        batch-size: 50
        timeout-seconds: 180

    shipment-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "0 */1 * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        timeout-seconds: 180

    description-publish:
      cron: "*/5 * * * * *"
      timezone: "Asia/Seoul"
      batch-size: 30

    seller-admin-email-outbox:
      process-pending:
        cron: "*/5 * * * * *"
        batch-size: 100
        delay-seconds: 5

      recover-timeout:
        cron: "0 */1 * * * *"
        batch-size: 100
        timeout-seconds: 180

    inbound-order-retry:
      cron: "0 */1 * * * *"
      batch-size: 100

    # 셀릭 주문 발행 (Stage: 비활성화 — 상품 연동 확인 후 활성화)
    sellic-order-issuing:
      enabled: false
      cron: "*/30 * * * * *"
      timezone: Asia/Seoul
      batch-size: 300
      sales-channel-id: 16

    cancel-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "*/30 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 20
        timeout-seconds: 60

    refund-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "*/30 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 20
        timeout-seconds: 60

    exchange-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "*/30 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 20
        timeout-seconds: 60

    qna-outbox:
      process-pending:
        enabled: true
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 50
        delay-seconds: 5

      recover-timeout:
        enabled: true
        cron: "*/30 * * * * *"
        timezone: "Asia/Seoul"
        batch-size: 20
        timeout-seconds: 60

    inbound-qna-polling:
      enabled: true
      cron: "*/30 * * * * *"
      timezone: "Asia/Seoul"
      batch-size: 100
