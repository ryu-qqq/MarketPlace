# ============================================================
# Scheduler Adapter 스테이징 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 지연
        delay-seconds: 30

      recover-timeout:
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 타임아웃
        timeout-seconds: 180

    image-upload-outbox:
      process-pending:
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 30
        # Stage: 중간 지연
        delay-seconds: 20

      recover-timeout:
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 30
        # Stage: 중간 타임아웃
        timeout-seconds: 180

    seller-admin-auth-outbox:
      process-pending:
        # Stage: 비활성화 (SellerAdminIdentityClient 미구현)
        enabled: false
        cron: "0 */3 * * * *"
        batch-size: 50
        delay-seconds: 30

      recover-timeout:
        # Stage: 비활성화 (SellerAdminIdentityClient 미구현)
        enabled: false
        cron: "0 */5 * * * *"
        batch-size: 50
        timeout-seconds: 180
