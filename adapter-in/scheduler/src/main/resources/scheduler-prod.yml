# ============================================================
# Scheduler Adapter 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        # Prod: 5분마다 (기본값)
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        # Prod: 10분마다 (기본값)
        cron: "0 */10 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 300

    image-upload-outbox:
      process-pending:
        # Prod: 5초마다
        cron: "*/5 * * * * *"
        # Prod: 큰 배치
        batch-size: 50
        # Prod: 안전한 지연
        delay-seconds: 5

      poll-processing:
        # Prod: 비활성화 (콜백 방식으로 전환)
        enabled: false
        cron: "0 */1 * * * *"
        batch-size: 50

      recover-timeout:
        # Prod: 1분마다
        cron: "0 */1 * * * *"
        # Prod: 큰 배치
        batch-size: 50
        # Prod: 1분 타임아웃
        timeout-seconds: 60

      recover-failed:
        # Prod: 5분마다
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 5분 후 복구
        failed-after-seconds: 300

    seller-admin-auth-outbox:
      process-pending:
        # Prod: 5분마다 (기본값)
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        # Prod: 10분마다 (기본값)
        cron: "0 */10 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 300

    image-transform-outbox:
      process-pending:
        # Prod: 5초마다
        cron: "*/5 * * * * *"
        # Prod: 큰 배치
        batch-size: 50
        # Prod: 안전한 지연
        delay-seconds: 5

      poll-processing:
        # Prod: 비활성화 (콜백 방식으로 전환)
        enabled: false
        cron: "0 */2 * * * *"
        batch-size: 50

      recover-timeout:
        # Prod: 1분마다
        cron: "0 */1 * * * *"
        # Prod: 큰 배치
        batch-size: 50
        # Prod: 1분 타임아웃
        timeout-seconds: 60

    image-variant-sync-outbox:
      process-pending:
        # Prod: 5분마다
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 50

    intelligence-pipeline:
      recover-stuck-aggregation:
        # Prod: 10분마다
        cron: "0 */10 * * * *"
        # Prod: 큰 배치
        batch-size: 20
        # Prod: 안전한 stuck 기준
        stuck-seconds: 300

    outbound-sync-outbox:
      process-pending:
        # Prod: 활성화
        enabled: true
        # Prod: 5초마다
        cron: "*/5 * * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 지연
        delay-seconds: 5

      recover-timeout:
        # Prod: 활성화
        enabled: true
        # Prod: 10분마다
        cron: "0 */10 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 300

    legacy-conversion:
      # Prod: 활성화 (레거시 상품 변환)
      enabled: true
      cron: "*/5 * * * * *"

    legacy-conversion-timeout:
      # Prod: 1분마다
      cron: "0 */1 * * * *"

    legacy-conversion-seeder:
      # Prod: 비활성화 (운영 주문 이관 미사용)
      enabled: false
      cron: "0 */1 * * * *"
      batch-size: 200
      max-total: 0

    # 셀릭 주문 폴링 (셀릭 API → luxurydb 저장 + Outbox 생성)
    sellic-order-issuing:
      enabled: true
      # Prod: 2시간마다
      cron: "0 0 */2 * * *"
      timezone: Asia/Seoul
      batch-size: 300
      sales-channel-id: 16

    # 레거시 주문 변환 (luxurydb → 내부 Order)
    legacy-order-conversion:
      enabled: true
      # Prod: 1분마다
      cron: "0 */1 * * * *"
      timezone: Asia/Seoul
      batch-size: 300

    # 레거시 주문 변환 타임아웃 복구
    legacy-order-conversion-timeout:
      # Prod: 10분마다
      cron: "0 */10 * * * *"
      timezone: Asia/Seoul
      batch-size: 50
      timeout-seconds: 600

    inbound-order-polling:
      entries:
        - sales-channel-id: 1
          # Prod: 비활성화 (세토프는 웹훅 기반, 폴링 불필요)
          enabled: false
          cron: "0 */5 * * * *"
          timezone: Asia/Seoul
          batch-size: 500

    outbound-seller-outbox:
      process-pending:
        # Prod: 5분마다 (기본값)
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        # Prod: 10분마다 (기본값)
        cron: "0 */10 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 300

    description-publish:
      # Prod: 5분마다
      cron: "0 */5 * * * *"
      timezone: "Asia/Seoul"
      # Prod: 큰 배치
      batch-size: 50

    shipment-outbox:
      process-pending:
        enabled: true
        # Prod: 1분마다 (배송 상태 동기화는 빠르게)
        cron: "0 */1 * * * *"
        timezone: "Asia/Seoul"
        batch-size: 100
        delay-seconds: 5

      recover-timeout:
        enabled: true
        # Prod: 5분마다
        cron: "0 */5 * * * *"
        timezone: "Asia/Seoul"
        batch-size: 100
        timeout-seconds: 300

    cancel-outbox:
      process-pending:
        enabled: true
        # Prod: 5분마다
        cron: "0 */5 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 200
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        enabled: true
        # Prod: 15분마다
        cron: "0 */15 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 600

    refund-outbox:
      process-pending:
        enabled: true
        # Prod: 5분마다
        cron: "0 */5 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 200
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        enabled: true
        # Prod: 15분마다
        cron: "0 */15 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 600

    exchange-outbox:
      process-pending:
        enabled: true
        # Prod: 5분마다
        cron: "0 */5 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 200
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        enabled: true
        # Prod: 15분마다
        cron: "0 */15 * * * *"
        timezone: "Asia/Seoul"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 600
