# ============================================================
# Scheduler Adapter 공통 설정
# ============================================================
# 환경별 설정은 scheduler-{profile}.yml 참조
# - scheduler-local.yml: 로컬 개발 환경
# - scheduler-stage.yml: 스테이징 환경
# - scheduler-prod.yml: 운영 환경
# ============================================================

# ============================================================
# Scheduler Job 설정
# ============================================================
scheduler:
  jobs:
    # SellerAuthOutbox 처리 스케줄러
    seller-auth-outbox:
      # PENDING 처리
      process-pending:
        enabled: true
        # Cron: 5분마다 (환경별 오버라이드 가능)
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 60

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다 (환경별 오버라이드 가능)
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # SellerAdminAuthOutbox 처리 스케줄러
    seller-admin-auth-outbox:
      # PENDING 처리
      process-pending:
        enabled: true
        # Cron: 5분마다 (환경별 오버라이드 가능)
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 60

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다 (환경별 오버라이드 가능)
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # ImageUploadOutbox 처리 스케줄러
    image-upload-outbox:
      # PENDING 처리
      process-pending:
        enabled: true
        # Cron: 3분마다
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 30

      # PROCESSING 폴링 (콜백 방식 전환으로 비활성화)
      poll-processing:
        enabled: false
        # Cron: 2분마다
        cron: "0 */2 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

      # FAILED 복구
      recover-failed:
        enabled: true
        # Cron: 30분마다
        cron: "0 */30 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # FAILED 후 최소 대기 시간 (초)
        failed-after-seconds: 3600

    # ImageTransformOutbox 처리 스케줄러
    image-transform-outbox:
      # PENDING 처리
      process-pending:
        enabled: true
        # Cron: 3분마다
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 30
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 10

      # PROCESSING 폴링
      poll-processing:
        enabled: true
        # Cron: 2분마다
        cron: "0 */2 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 30
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 600

    # ImageVariantSyncOutbox 처리 스케줄러
    image-variant-sync-outbox:
      # PENDING 처리 (세토프 Sync API 호출)
      process-pending:
        enabled: true
        # Cron: 5분마다
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50

    # DescriptionPublish 처리 스케줄러
    description-publish:
      enabled: true
      # Cron: 5분마다
      cron: "0 */5 * * * *"
      timezone: Asia/Seoul
      # 배치 크기
      batch-size: 50

    # IntelligencePipeline Outbox Relay 스케줄러
    intelligence-pipeline:
      # PENDING 처리 (3개 Analyzer 큐 발행)
      process-pending:
        enabled: true
        # Cron: 5분마다
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 20
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 60

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 20
        # 타임아웃 기준 (SENT 상태에서 N초 경과 시 복구)
        timeout-seconds: 600

      # Stuck Aggregation 복구 (분석 완료 후 Aggregation 발행 누락)
      recover-stuck-aggregation:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 20
        # Stuck 기준 (ANALYZING + allCompleted 상태에서 N초 경과 시 복구)
        stuck-seconds: 300

    # InboundOrder 외부 주문 폴링 스케줄러 (SalesChannel별)
    # 세토프(id=1)는 웹훅으로 수신하므로 폴링 불필요
    inbound-order-polling:
      enabled: true
      entries:
        - sales-channel-id: 2
          enabled: true
          cron: "0 0 * * * *"
          timezone: Asia/Seoul
          batch-size: 500
        - sales-channel-id: 16
          enabled: true
          cron: "0 0 10,13,15,17,19 * * *"
          timezone: Asia/Seoul
          batch-size: 500

    # InboundOrder PENDING_MAPPING 재시도 스케줄러
    inbound-order-retry:
      enabled: true
      cron: "0 */10 * * * *"
      timezone: Asia/Seoul
      batch-size: 100

    # InboundProduct PENDING_MAPPING 재처리 스케줄러
    inbound-product-retry:
      enabled: true
      # Cron: 10분마다
      cron: "0 */10 * * * *"
      timezone: Asia/Seoul
      # 배치 크기
      batch-size: 50

    # OutboundSyncOutbox 처리 스케줄러
    outbound-sync-outbox:
      # PENDING 처리 (SQS 발행)
      process-pending:
        enabled: true
        # Cron: 3분마다
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # LegacyOrderConversion 주문 변환 스케줄러
    legacy-order-conversion:
      enabled: false
      cron: "0 */5 * * * *"
      timezone: Asia/Seoul

    # LegacyOrderConversion 타임아웃 복구
    legacy-order-conversion-timeout:
      cron: "0 */10 * * * *"
      timezone: Asia/Seoul

    # LegacyOrderConversion 벌크 시딩 스케줄러
    legacy-order-conversion-seeder:
      enabled: false
      # Cron: 30분마다
      cron: "0 */30 * * * *"
      timezone: Asia/Seoul
      # 배치 크기 (한 번에 스캔할 ID 수)
      batch-size: 100
      # 최대 총 시딩 수 (0 = 무제한)
      max-total: 0

    # OutboundSellerOutbox 처리 스케줄러 (외부 셀러 동기화)
    outbound-seller-outbox:
      # PENDING 처리
      process-pending:
        enabled: true
        # Cron: 5분마다 (환경별 오버라이드 가능)
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 60

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다 (환경별 오버라이드 가능)
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # CancelOutbox 처리 스케줄러 (취소 SQS 발행)
    cancel-outbox:
      # PENDING 처리 (SQS 발행)
      process-pending:
        enabled: true
        # Cron: 3분마다
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # RefundOutbox 처리 스케줄러 (환불 SQS 발행)
    refund-outbox:
      # PENDING 처리 (SQS 발행)
      process-pending:
        enabled: true
        # Cron: 3분마다
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # ExchangeOutbox 처리 스케줄러 (교환 SQS 발행)
    exchange-outbox:
      # PENDING 처리 (SQS 발행)
      process-pending:
        enabled: true
        # Cron: 3분마다
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 50
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # QnaOutbox 처리 스케줄러 (QnA 답변 외부 동기화)
    qna-outbox:
      # PENDING 처리 (SQS 발행)
      process-pending:
        enabled: false
        cron: "0 */3 * * * *"
        timezone: Asia/Seoul
        batch-size: 100
        delay-seconds: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: false
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        batch-size: 50
        timeout-seconds: 300

    # InboundQna 폴링 스케줄러 (외부 QnA 수집)
    inbound-qna-polling:
      enabled: false
      cron: "0 */5 * * * *"
      timezone: Asia/Seoul
      batch-size: 100
      sales-channel-ids:
        - 2

    # InboundQna RECEIVED 재변환 스케줄러
    inbound-qna-retry:
      enabled: false
      cron: "0 */10 * * * *"
      timezone: Asia/Seoul
      batch-size: 100

    # SellerAdminEmailOutbox 처리 스케줄러
    seller-admin-email-outbox:
      # PENDING 처리
      process-pending:
        enabled: true
        # Cron: 1분마다 (환경별 오버라이드 가능)
        cron: "0 */1 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 30

      # 타임아웃 복구
      recover-timeout:
        enabled: true
        # Cron: 10분마다 (환경별 오버라이드 가능)
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300
