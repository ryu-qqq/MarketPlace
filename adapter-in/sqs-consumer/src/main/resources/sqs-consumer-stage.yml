# ============================================================
# SQS Consumer 스테이지 환경 설정
# ============================================================
spring:
  cloud:
    aws:
      region:
        static: ap-northeast-2
      sqs:
        enabled: true

# ============================================================
# Intelligence Pipeline Consumer 일시정지 (OpenAI 크레딧 소진)
# ============================================================
sqs:
  consumer:
    outbound-sync:
      enabled: true
    intelligence-orchestration:
      enabled: false
    intelligence-description-analysis:
      enabled: false
    intelligence-option-analysis:
      enabled: false
    intelligence-notice-analysis:
      enabled: false
    intelligence-aggregation:
      enabled: false
