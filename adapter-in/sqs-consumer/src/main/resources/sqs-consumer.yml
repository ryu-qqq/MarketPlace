# ============================================================
# SQS Consumer 공통 설정
# ============================================================
# Spring Cloud AWS @SqsListener 기반 메시지 수신
# 큐별 활성화/비활성화 제어
# ============================================================
sqs:
  consumer:
    inspection-scoring:
      enabled: true

    inspection-enhancement:
      enabled: true

    inspection-verification:
      enabled: true

# ============================================================
# Spring Cloud AWS SQS 설정
# ============================================================
spring:
  cloud:
    aws:
      region:
        static: ap-northeast-2
      sqs:
        enabled: true
