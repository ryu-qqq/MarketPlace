version: '3.8'
name: marketplace-aws

# ===============================================
# Stage AWS 리소스 연결용 로컬 개발 환경
# ===============================================
# 사용법:
# 1. ./scripts/aws-port-forward-stage.sh 실행 (Stage RDS -> localhost:13308)
# 2. docker-compose -f docker-compose.aws.yml --env-file .env.aws.stage up -d
# ===============================================

services:
  # ===============================================
  # Local Infrastructure (AWS 미배포 리소스)
  # ===============================================

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ===============================================
  # Application Services (Stage AWS 리소스 연결)
  # ===============================================

  web-api:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-web-api/Dockerfile
    container_name: marketplace-web-api
    env_file:
      - .env.aws.stage
    environment:
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8080
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Dpersistence.legacy.enabled=true"

      # Database (Stage RDS via SSM Port Forwarding - localhost:13308)
      DB_HOST: host.docker.internal
      DB_PORT: 13308
      # DB_NAME, DB_USERNAME, DB_PASSWORD -> .env.aws.stage

      # Legacy Database (same RDS, different schema)
      LEGACY_DB_NAME: "${LEGACY_DB_NAME}"
      LEGACY_DB_USERNAME: "${LEGACY_DB_USERNAME}"
      LEGACY_DB_PASSWORD: "${LEGACY_DB_PASSWORD}"

      # Redis (local container)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"

      # AuthHub Client
      AUTHHUB_BASE_URL: "http://authhub-web-api-stage.connectly.local"
      AUTHHUB_SERVICE_TOKEN: "${AUTHHUB_SERVICE_TOKEN}"
      SECURITY_SERVICE_TOKEN_SECRET: "${AUTHHUB_SERVICE_TOKEN}"

      # FileFlow Client
      FILEFLOW_BASE_URL: "http://fileflow-web-api-stage.connectly.local"
      FILEFLOW_SERVICE_TOKEN: "${FILEFLOW_SERVICE_TOKEN}"

      # SQS Queue URLs (dummy for local)
      SQS_QUEUES_INTELLIGENCE_ORCHESTRATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-orchestration"
      SQS_QUEUES_INTELLIGENCE_DESCRIPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-description"
      SQS_QUEUES_INTELLIGENCE_OPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-option"
      SQS_QUEUES_INTELLIGENCE_NOTICE_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-notice"
      SQS_QUEUES_INTELLIGENCE_AGGREGATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-aggregation"
      SQS_QUEUES_OUTBOUND_SYNC: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-outbound-sync"
      SQS_QUEUES_CANCEL_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-cancel-outbox"
      SQS_QUEUES_REFUND_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-refund-outbox"
      SQS_QUEUES_EXCHANGE_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-exchange-outbox"
      SQS_QUEUES_SHIPMENT_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-shipment-outbox"

      # OpenTelemetry disabled (local)
      OTEL_JAVAAGENT_ENABLED: "false"

      # Flyway disabled (stage DB schema already up-to-date)
      SPRING_FLYWAY_ENABLED: "false"

    ports:
      - "9090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  legacy-api:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-legacy-api/Dockerfile
    container_name: marketplace-legacy-api
    env_file:
      - .env.aws.stage
    environment:
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8081
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Dpersistence.legacy.enabled=true"

      # Database (Stage RDS via SSM Port Forwarding - localhost:13308)
      DB_HOST: host.docker.internal
      DB_PORT: 13308
      # DB_NAME, DB_USERNAME, DB_PASSWORD -> .env.aws.stage

      # Legacy Database (same RDS, different schema)
      LEGACY_DB_NAME: "${LEGACY_DB_NAME}"
      LEGACY_DB_USERNAME: "${LEGACY_DB_USERNAME}"
      LEGACY_DB_PASSWORD: "${LEGACY_DB_PASSWORD}"
      LEGACY_DB_ENABLED: "true"

      # Redis (local container)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"

      # AuthHub Client
      AUTHHUB_BASE_URL: "http://authhub-web-api-stage.connectly.local"
      AUTHHUB_SERVICE_TOKEN: "${AUTHHUB_SERVICE_TOKEN}"
      SECURITY_SERVICE_TOKEN_SECRET: "${AUTHHUB_SERVICE_TOKEN}"

      # FileFlow Client
      FILEFLOW_BASE_URL: "http://fileflow-web-api-stage.connectly.local"
      FILEFLOW_SERVICE_TOKEN: "${FILEFLOW_SERVICE_TOKEN}"

      # Legacy Auth JWT
      LEGACY_TOKEN_SECRET: "${LEGACY_TOKEN_SECRET}"

      # SQS Queue URLs (dummy for local)
      SQS_QUEUES_INTELLIGENCE_ORCHESTRATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-orchestration"
      SQS_QUEUES_INTELLIGENCE_DESCRIPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-description"
      SQS_QUEUES_INTELLIGENCE_OPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-option"
      SQS_QUEUES_INTELLIGENCE_NOTICE_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-notice"
      SQS_QUEUES_INTELLIGENCE_AGGREGATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-aggregation"
      SQS_QUEUES_OUTBOUND_SYNC: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-outbound-sync"
      SQS_QUEUES_CANCEL_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-cancel-outbox"
      SQS_QUEUES_REFUND_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-refund-outbox"
      SQS_QUEUES_EXCHANGE_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-exchange-outbox"
      SQS_QUEUES_SHIPMENT_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-shipment-outbox"

      # OpenTelemetry disabled (local)
      OTEL_JAVAAGENT_ENABLED: "false"

      # Flyway disabled (stage DB schema already up-to-date)
      SPRING_FLYWAY_ENABLED: "false"

      # Hibernate validation 스킵 (Stage DB 스키마 마이그레이션 간극)
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"

    ports:
      - "9083:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-scheduler/Dockerfile
    container_name: marketplace-scheduler
    env_file:
      - .env.aws.stage
    environment:
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8081
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Dpersistence.legacy.enabled=true"

      # Database (Stage RDS via SSM Port Forwarding - localhost:13308)
      DB_HOST: host.docker.internal
      DB_PORT: 13308
      # DB_NAME, DB_USERNAME, DB_PASSWORD -> .env.aws.stage

      # Legacy Database (same RDS, different schema)
      LEGACY_DB_NAME: "${LEGACY_DB_NAME}"
      LEGACY_DB_USERNAME: "${LEGACY_DB_USERNAME}"
      LEGACY_DB_PASSWORD: "${LEGACY_DB_PASSWORD}"

      # Redis (host machine - 로컬에 이미 떠있는 Redis 사용)
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"

      # AuthHub Client
      AUTHHUB_BASE_URL: "http://authhub-web-api-stage.connectly.local"
      AUTHHUB_SERVICE_TOKEN: "${AUTHHUB_SERVICE_TOKEN}"

      # FileFlow Client
      FILEFLOW_BASE_URL: "http://fileflow-web-api-stage.connectly.local"
      FILEFLOW_SERVICE_TOKEN: "${FILEFLOW_SERVICE_TOKEN}"

      # SQS Queue URLs (dummy for local)
      SQS_QUEUES_INTELLIGENCE_ORCHESTRATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-orchestration"
      SQS_QUEUES_INTELLIGENCE_DESCRIPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-description"
      SQS_QUEUES_INTELLIGENCE_OPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-option"
      SQS_QUEUES_INTELLIGENCE_NOTICE_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-notice"
      SQS_QUEUES_INTELLIGENCE_AGGREGATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-aggregation"
      SQS_QUEUES_OUTBOUND_SYNC: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-outbound-sync"
      SQS_QUEUES_CANCEL_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-cancel-outbox"
      SQS_QUEUES_REFUND_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-refund-outbox"
      SQS_QUEUES_EXCHANGE_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-exchange-outbox"
      SQS_QUEUES_SHIPMENT_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-shipment-outbox"

      # Naver Commerce
      NAVER_COMMERCE_CLIENT_ID: "${NAVER_COMMERCE_CLIENT_ID}"
      NAVER_COMMERCE_CLIENT_SECRET: "${NAVER_COMMERCE_CLIENT_SECRET}"

      # Sellic Commerce
      SELLIC_COMMERCE_BASE_URL: "${SELLIC_COMMERCE_BASE_URL}"
      SELLIC_COMMERCE_CUSTOMER_ID: "${SELLIC_COMMERCE_CUSTOMER_ID}"
      SELLIC_COMMERCE_API_KEY: "${SELLIC_COMMERCE_API_KEY}"

      # OpenTelemetry disabled (local)
      OTEL_JAVAAGENT_ENABLED: "false"

      # Flyway disabled (stage DB schema already up-to-date)
      SPRING_FLYWAY_ENABLED: "false"

      # Spring AI (dummy - 스케줄러에서 미사용)
      SPRING_AI_OPENAI_API_KEY: "sk-dummy-local-not-used"

    ports:
      - "9081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-worker/Dockerfile
    container_name: marketplace-worker
    env_file:
      - .env.aws.stage
    environment:
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8082
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Dpersistence.legacy.enabled=true"

      # Database (Stage RDS via SSM Port Forwarding - localhost:13308)
      DB_HOST: host.docker.internal
      DB_PORT: 13308
      # DB_NAME, DB_USERNAME, DB_PASSWORD -> .env.aws.stage

      # Legacy Database (same RDS, different schema)
      LEGACY_DB_NAME: "${LEGACY_DB_NAME}"
      LEGACY_DB_USERNAME: "${LEGACY_DB_USERNAME}"
      LEGACY_DB_PASSWORD: "${LEGACY_DB_PASSWORD}"

      # Redis (local container)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"

      # AuthHub Client
      AUTHHUB_BASE_URL: "http://authhub-web-api-stage.connectly.local"
      AUTHHUB_SERVICE_TOKEN: "${AUTHHUB_SERVICE_TOKEN}"

      # FileFlow Client
      FILEFLOW_BASE_URL: "http://fileflow-web-api-stage.connectly.local"
      FILEFLOW_SERVICE_TOKEN: "${FILEFLOW_SERVICE_TOKEN}"

      # SQS Queue URLs (dummy for local - no SQS in local)
      SQS_QUEUES_INTELLIGENCE_ORCHESTRATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-orchestration"
      SQS_QUEUES_INTELLIGENCE_DESCRIPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-description"
      SQS_QUEUES_INTELLIGENCE_OPTION_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-option"
      SQS_QUEUES_INTELLIGENCE_NOTICE_ANALYSIS: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-notice"
      SQS_QUEUES_INTELLIGENCE_AGGREGATION: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-aggregation"
      SQS_QUEUES_OUTBOUND_SYNC: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-outbound-sync"
      SQS_QUEUES_CANCEL_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-cancel-outbox"
      SQS_QUEUES_REFUND_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-refund-outbox"
      SQS_QUEUES_EXCHANGE_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-exchange-outbox"
      SQS_QUEUES_SHIPMENT_OUTBOX: "https://sqs.ap-northeast-2.amazonaws.com/000000000000/dummy-shipment-outbox"

      # OpenTelemetry disabled (local)
      OTEL_JAVAAGENT_ENABLED: "false"

      # Flyway disabled (stage DB schema already up-to-date)
      SPRING_FLYWAY_ENABLED: "false"

    ports:
      - "9082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
