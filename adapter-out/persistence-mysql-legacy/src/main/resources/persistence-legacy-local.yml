# ============================================================
# Persistence Legacy Layer 로컬 개발 환경 설정
# ============================================================
# 활성화: spring.profiles.active=local
# ============================================================

persistence:
  legacy:
    datasource:
      jdbc-url: jdbc:mysql://${LEGACY_DB_HOST:localhost}:${LEGACY_DB_PORT:3306}/${LEGACY_DB_NAME:luxurydb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      username: ${LEGACY_DB_USER:root}
      password: ${LEGACY_DB_PASSWORD:}
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      pool-name: HikariPool-Legacy-Local
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
