# ============================================================
# Legacy Auth (JWT) 설정
# ============================================================
# 환경변수로 제어:
#   - LEGACY_TOKEN_SECRET: HS256 서명 시크릿 (필수)
# ============================================================

legacy:
  token:
    secret: ${LEGACY_TOKEN_SECRET:}
    access-token-expire-time: 1800000
    refresh-token-expire-time: 10800000
