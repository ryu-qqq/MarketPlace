# ===============================================
# Persistence Layer Test Configuration (H2)
# ===============================================
# Integration Test용 H2 인메모리 데이터베이스 설정
#
# @author development-team
# @since 1.0.0
# ===============================================

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:

    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: TestHikariPool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false

logging:
  level:
    com.ryuqq: DEBUG
    org.hibernate.SQL: DEBUG
