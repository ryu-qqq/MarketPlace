# ============================================================
# Scheduler Application 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
# ============================================================

logging:
  level:
    root: INFO
    com.ryuqq.setof: INFO
    com.ryuqq.setof.adapter.in.scheduler: INFO
    org.hibernate.SQL: WARN

# Sentry 활성화 (운영)
# DSN은 ECS Task Definition 환경변수로 주입
sentry:
  send-default-pii: true
  attach-stacktrace: true
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# ============================================================
# Intelligence Pipeline 스케줄러 비활성화
# ============================================================
scheduler:
  jobs:
    intelligence-pipeline:
      process-pending:
        enabled: false
      recover-timeout:
        enabled: false
      recover-stuck-aggregation:
        enabled: false
