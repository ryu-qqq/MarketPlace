# ============================================================
# Scheduler Application 스테이징 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
# ============================================================

logging:
  level:
    root: INFO
    com.ryuqq.setof: INFO
    com.ryuqq.setof.adapter.in.scheduler: INFO
    org.hibernate.SQL: DEBUG

# Sentry Configuration (Stage)
sentry:
  dsn: ${SENTRY_DSN:}
  environment: stage
  send-default-pii: true
  attach-stacktrace: true
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
